  const stage = document.getElementById('stage');

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
  camera.position.set(0, 0, 8);

  const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  stage.insertBefore(renderer.domElement, document.getElementById('vignette'));

  const loader = new THREE.TextureLoader();
  const imgAspect = 640/480;
  const planeH = 6.4;
  const planeW = planeH * imgAspect;

  // ---------- Background layer (character removed, slight blur left in) ----------
  const bgTex = loader.load(BG_SRC);
  const bgGeo = new THREE.PlaneGeometry(planeW*1.3, planeH*1.3, 2, 2);
  const bgMat = new THREE.MeshBasicMaterial({ map:bgTex });
  const bgPlane = new THREE.Mesh(bgGeo, bgMat);
  bgPlane.position.z = -1.2;
  scene.add(bgPlane);

  // ---------- Character layer (cutout, transparent PNG) ----------
  const charTex = loader.load(CHAR_SRC);
  const charGeo = new THREE.PlaneGeometry(planeW, planeH, 30, 30);
  const charMat = new THREE.MeshBasicMaterial({ map:charTex, transparent:true });
  const charPlane = new THREE.Mesh(charGeo, charMat);
  scene.add(charPlane);
  const charBase = charGeo.attributes.position.array.slice();

  // gun muzzle position estimated from the cutout mask (image coords 640x480)
  const muzzleFx = 112/640;
  const muzzleFy = 153/480;
  const muzzleLocal = new THREE.Vector3(
    (muzzleFx - 0.5) * planeW,
    (0.5 - muzzleFy) * planeH,
    0.05
  );

  // ---------- Muzzle flash sprite ----------
  const flashCanvas = document.createElement('canvas');
  flashCanvas.width = flashCanvas.height = 128;
  const fctx = flashCanvas.getContext('2d');
  const grad = fctx.createRadialGradient(64,64,0,64,64,64);
  grad.addColorStop(0, 'rgba(255,244,200,1)');
  grad.addColorStop(0.35, 'rgba(255,196,90,0.9)');
  grad.addColorStop(0.7, 'rgba(255,120,40,0.35)');
  grad.addColorStop(1, 'rgba(255,120,40,0)');
  fctx.fillStyle = grad;
  fctx.fillRect(0,0,128,128);
  const flashTex = new THREE.CanvasTexture(flashCanvas);
  const flashMat = new THREE.SpriteMaterial({ map:flashTex, transparent:true, opacity:0, blending:THREE.AdditiveBlending, depthWrite:false });
  const flashSprite = new THREE.Sprite(flashMat);
  flashSprite.scale.set(1.4,1.4,1);
  flashSprite.position.copy(muzzleLocal);
  scene.add(flashSprite);

  // ---------- Ambient dust particles (in front, slow) ----------
  const particleCount = 160;
  const particleGeo = new THREE.BufferGeometry();
  const positions = new Float32Array(particleCount*3);
  const speeds = new Float32Array(particleCount);
  for(let i=0;i<particleCount;i++){
    positions[i*3+0] = (Math.random()-0.5)*planeW*1.4;
    positions[i*3+1] = (Math.random()-0.5)*planeH*1.4;
    positions[i*3+2] = (Math.random())*3 + 0.5;
    speeds[i] = 0.15 + Math.random()*0.3;
  }
  particleGeo.setAttribute('position', new THREE.BufferAttribute(positions,3));
  const particleMat = new THREE.PointsMaterial({
    color:0xd8cdb0, size:0.045, transparent:true, opacity:0.5,
    depthWrite:false, blending:THREE.AdditiveBlending
  });
  const particles = new THREE.Points(particleGeo, particleMat);
  scene.add(particles);

  // ---------- Fit helpers ----------
  function fitPlane(mesh, w, h){
    const distance = camera.position.z - mesh.position.z;
    const vFov = camera.fov * Math.PI/180;
    const viewH = 2*Math.tan(vFov/2)*distance;
    const viewW = viewH * camera.aspect;
    const scale = Math.max(viewW/w, viewH/h) * 1.05;
    mesh.userData.fitScale = scale;
  }

  function onResize(){
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    fitPlane(bgPlane, planeW*1.3, planeH*1.3);
    fitPlane(charPlane, planeW, planeH);
  }
  window.addEventListener('resize', onResize);
  onResize();

  // ---------- Pointer parallax ----------
  const mouse = { x:0, y:0 };
  const bgT = { x:0, y:0 };
  const charT = { rx:0, ry:0, x:0, y:0 };

  function updatePointer(cx, cy){
    mouse.x = (cx/window.innerWidth)*2 - 1;
    mouse.y = (cy/window.innerHeight)*2 - 1;
  }
  window.addEventListener('pointermove', e=>updatePointer(e.clientX, e.clientY));
  window.addEventListener('touchmove', e=>{
    if(e.touches && e.touches[0]) updatePointer(e.touches[0].clientX, e.touches[0].clientY);
  }, {passive:true});

  // ---------- Recoil / fire trigger ----------
  let recoil = 0; // 0..1 decays
  function fire(){
    recoil = 1;
  }
  setInterval(fire, 2600 + Math.random()*1400);

  // ---------- Animation loop ----------
  const clock = new THREE.Clock();

  function animate(){
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();

    // background: slow, subtle parallax (moves less than character = depth cue)
    bgT.x += (mouse.x*0.18 - bgT.x)*0.04;
    bgT.y += (-mouse.y*0.1 - bgT.y)*0.04;
    bgPlane.scale.set(bgPlane.userData.fitScale, bgPlane.userData.fitScale, 1);
    bgPlane.position.x = bgT.x;
    bgPlane.position.y = bgT.y;

    // character: stronger parallax + idle breathing + sway
    charT.ry += (mouse.x*0.26 - charT.ry)*0.07;
    charT.rx += (-mouse.y*0.16 - charT.rx)*0.07;
    charT.x  += (mouse.x*0.55 - charT.x)*0.08;
    charT.y  += (-mouse.y*0.3 - charT.y)*0.08;

    const breathe = Math.sin(t*1.3)*0.012;               // chest/torso breathing
    const sway    = Math.sin(t*0.55)*0.03;                // idle weight shift
    const bob      = Math.sin(t*0.9)*0.02;                 // subtle up/down

    // recoil decays quickly (simulates the gun kicking back after firing)
    recoil *= 0.9;
    const recoilKick = recoil*0.18;
    const recoilRot  = recoil*0.07;

    charPlane.scale.set(
      charPlane.userData.fitScale*(1+breathe*0.4),
      charPlane.userData.fitScale*(1+breathe),
      1
    );
    charPlane.rotation.y = charT.ry + sway*0.5;
    charPlane.rotation.x = charT.rx;
    charPlane.rotation.z = sway*0.35 - recoilRot;
    charPlane.position.x = charT.x - recoilKick;
    charPlane.position.y = charT.y + bob;
    charPlane.position.z = 0.3 + Math.sin(t*0.4)*0.08;

    // localized vertex motion: hair / sleeve sway stronger toward top & edges
    const posAttr = charGeo.attributes.position;
    for(let i=0;i<posAttr.count;i++){
      const bx = charBase[i*3+0];
      const by = charBase[i*3+1];
      const heightFactor = (by/ (planeH/2) + 1) * 0.5; // 0 bottom -> 1 top
      const wave = Math.sin(bx*1.1 + t*1.6) * 0.03 * heightFactor
                 + Math.cos(by*0.8 + t*1.1) * 0.015;
      posAttr.array[i*3+2] = wave;
    }
    posAttr.needsUpdate = true;

    // muzzle flash flicker tied to recoil
    flashMat.opacity = Math.min(1, recoil*1.4);
    flashSprite.scale.set(1.1 + recoil*0.9, 1.1 + recoil*0.9, 1);
    flashSprite.position.set(
      muzzleLocal.x + charPlane.position.x - recoilKick*0.5,
      muzzleLocal.y + charPlane.position.y,
      muzzleLocal.z + charPlane.position.z
    );

    // ambient particle drift
    const pPos = particleGeo.attributes.position.array;
    for(let i=0;i<particleCount;i++){
      pPos[i*3+1] += speeds[i]*0.008;
      if(pPos[i*3+1] > planeH*0.8){ pPos[i*3+1] = -planeH*0.8; }
      pPos[i*3+0] += Math.sin(t*0.4+i)*0.0015;
    }
    particleGeo.attributes.position.needsUpdate = true;

    renderer.render(scene, camera);
  }
  animate();
})();
</script>
</body>
</html>
